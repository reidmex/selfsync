name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64

    runs-on: ubuntu-latest
    timeout-minutes: 30  # 设置超时时间，默认是 6 小时
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config libssl-dev

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: |
          # 设置更快的链接器（可选）
          export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
          
          # 使用并行编译
          cargo build --release --target ${{ matrix.target }} \
            --jobs $(nproc) \
            --verbose  # 添加 verbose 查看详细进度

      - name: Prepare binary
        run: |
          cp target/${{ matrix.target }}/release/selfsync-server ./selfsync-server
          strip ./selfsync-server
          sha256sum ./selfsync-server > ./selfsync-server.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-binary
          path: |
            selfsync-server
            selfsync-server.sha256
