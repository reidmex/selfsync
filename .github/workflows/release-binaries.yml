name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      # 关键步骤：为不同平台安装 protoc
      - name: Install dependencies
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y protobuf-compiler libprotobuf-dev pkg-config libssl-dev
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew install protobuf
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            choco install protoc
          fi
        shell: bash

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          BINARY_NAME=selfsync-server${{ matrix.suffix || '' }}
          cp target/${{ matrix.target }}/release/$BINARY_NAME ./$BINARY_NAME
          
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            strip ./$BINARY_NAME
          fi
          
          shasum -a 256 ./$BINARY_NAME > ./$BINARY_NAME.sha256
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            certutil -hashfile ./$BINARY_NAME SHA256 > ./$BINARY_NAME.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-binary
          path: |
            selfsync-server${{ matrix.suffix || '' }}
            selfsync-server${{ matrix.suffix || '' }}.sha256

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: '*-binary'
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: artifacts/**/*
