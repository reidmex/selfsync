application:
  subdomain: chrome-sync
  upstreams:
    - location: /
      backend: http://selfsync:8080
  public_path:
    - /
  health_check:
    test_url: http://selfsync:8080/healthz
    timeout: 10s
    start_period: 5s
services:
  selfsync:
    image: registry.lazycat.cloud/lee/loyalpartner/selfsync:2f640ee48174e19e
    environment:
      - SELFSYNC_DB=/lzcapp/var/data/selfsync.db
      - SELFSYNC_ADDR=0.0.0.0:8080
      - RUST_LOG=selfsync_server=info
    binds:
      - /lzcapp/var/data:/data
