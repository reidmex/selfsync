lzc-sdk-version: 0.1
application:
  subdomain: chrome-sync
  upstreams:
    - location: /
      backend: http://selfsync:8080
  public_path:
    - /
services:
  selfsync:
    image: registry.lazycat.cloud/lee/loyalpartner/selfsync:5ad8b1900a0a0179
    environment:
      - SELFSYNC_DB=/lzcapp/var/data/selfsync.db
      - SELFSYNC_ADDR=0.0.0.0:8080
      - RUST_LOG=selfsync_server=info
    binds:
      - /lzcapp/var/data:/data
    healthcheck:
      path: /healthz
      interval: 30s
